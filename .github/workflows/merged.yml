name: Post Thank You Comment
on:
  pull_request:
    types:
      - closed
jobs:
  build:
    name: Post Thank You Comment
    runs-on: ubuntu-latest
    steps:
      - run: gh pr comment $PR_URL --body "Thank you for merging!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
